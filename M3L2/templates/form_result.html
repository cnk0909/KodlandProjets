<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../static/css/style.css">
    <title>Form Sonuçları</title>
</head>

<body>
    <header class="header">
        <div class="header__text">
            <h1>Evinizin enerji verimliliğini hesaplayın!</h1>
            <p>Girişimde bulunun ve aşırı enerji tüketimi sorununu çözün!</p>
        </div>
    </header>
    {% block content %}
    <h1 class="t">Formu doldurduğunuz için teşekkür ederiz.</h1>
    <p class="pa">Adınız : {{ name }}</p>
    <p class="pa">E-postanız : {{ email }}</p>
    <p class="pa">Adresiniz : {{ address }}</p>
    <p class="pa">Tarih : {{ date }}</p>
    {% endblock %}
</body>

</html>
